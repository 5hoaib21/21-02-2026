<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <!-- CSS LINK  -->
     <link rel="stylesheet" href="./Style/tailwind.init.css">
    <!-- FAViCON -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!--  Tailwind + Daisy cDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome CDN  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-32">
      <img src="./assets/Logo-full.png" alt="">
    </div>
    <div class="form pt-10">
      <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Mobile Number</label>
          <input id="inp-number" type="text" value="12345678901" maxlength="11" minlength="11" class="input rounded-full bg-base-200" placeholder="Enter ur MObile Number" /> <br> 
          <label class="label text-neutral font-bold">4 DIgit Pin</label>
          <input id="inp-pin" type="password" value="1234" maxlength="4" minlength="4" class="input rounded-full bg-base-200" placeholder="Enter ur 4 digit pin" />
          
          <button id="login-btn" class="btn mt-4 rounded-full btn-primary">Login</button>
        </fieldset>
      </div>
    </div>
    </div>




  <script src="./Script/login.js"></script>
  </body>
</html>
